services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      APP_NAME: ${APP_NAME:-AuditFlow AI Backend}
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: ${APP_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      QDRANT_URL: ${QDRANT_URL:?QDRANT_URL is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_MODEL: ${OPENAI_MODEL:?OPENAI_MODEL is required}
      UPLOAD_STORAGE_DIR: ${UPLOAD_STORAGE_DIR:-storage/uploads}
      DOCUMENT_METADATA_PATH: ${DOCUMENT_METADATA_PATH:-storage/document_metadata.json}
      ANALYSIS_REPORT_PATH: ${ANALYSIS_REPORT_PATH:-storage/analysis_reports.json}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-10485760}
      KNOWLEDGE_COLLECTION_NAME: ${KNOWLEDGE_COLLECTION_NAME:-auditflow_knowledge}
      EMBEDDING_VECTOR_SIZE: ${EMBEDDING_VECTOR_SIZE:-64}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-5}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    depends_on:
      - postgres
      - qdrant
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port ${APP_PORT:-8000} --reload

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pg_data:
  qdrant_data:
